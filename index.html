<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Repaso</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Tu CSS personalizado -->
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="index.html">CRUD</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="callback.html">Callback</a></li>
        <li class="nav-item"><a class="nav-link" href="promise.html">Promise</a></li>
        <li class="nav-item"><a class="nav-link" href="async.html">Async/Await</a></li>
        <li class="nav-item"><a class="nav-link" href="objects.html">Destructuring</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Contenedor principal -->
<div class="container">
  <h2 class="mb-4 text-center">Gestión de Usuarios</h2>

  <!-- Formulario -->
  <div class="row g-2 mb-3">
    <div class="col-md-4">
      <input type="text" id="nombre" class="form-control" placeholder="Nombre">
    </div>
    <div class="col-md-4">
      <input type="email" id="correo" class="form-control" placeholder="Correo">
    </div>
    <div class="col-md-3">
      <input type="text" id="documento" class="form-control" placeholder="Documento">
    </div>
    <div class="col-md-1 d-grid">
      <button class="btn btn-primary" onclick="agregar()">Agregar</button>
    </div>
  </div>

  <!-- Mensaje de error -->
  <p id="mensaje" class="text-danger"></p>

  <!-- Tabla de usuarios -->
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Documento</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Tu JS del CRUD -->
<script src="js/crud.js"></script>
</body>
</html>
